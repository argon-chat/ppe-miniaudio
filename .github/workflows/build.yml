name: build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  # ---- native libs + per-OS C# smoke test --------------------------------------
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: mlugg/setup-zig@v2
        with: { version: 0.16.0 }
      - name: Build native (linux-x64) + cross (win-x64)
        run: |
          zig build -Doptimize=ReleaseFast
          mkdir -p runtimes/linux-x64/native
          cp zig-out/lib/libminiaudio.so runtimes/linux-x64/native/
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - name: C# smoke test (headless → interop gate, playback skipped)
        run: dotnet run --project csharp/Miniaudio.SmokeTest -c Release
      - uses: actions/upload-artifact@v4
        with: { name: runtimes-linux-x64, path: runtimes/linux-x64 }

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: mlugg/setup-zig@v2
        with: { version: 0.16.0 }
      - name: Build native (win-x64)
        shell: pwsh
        run: |
          zig build -Doptimize=ReleaseFast
          New-Item -ItemType Directory -Force runtimes/win-x64/native | Out-Null
          Copy-Item zig-out/bin/miniaudio.dll runtimes/win-x64/native/
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - name: C# smoke test
        run: dotnet run --project csharp/Miniaudio.SmokeTest -c Release
      - uses: actions/upload-artifact@v4
        with: { name: runtimes-win-x64, path: runtimes/win-x64 }

  macos:
    runs-on: macos-14 # arm64
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Build native (osx-arm64) with clang
        run: |
          mkdir -p runtimes/osx-arm64/native
          clang -O2 -dynamiclib -fvisibility=hidden -DMA_NO_ENCODING \
            -I miniaudio miniaudio/miniaudio.c bindings/ma_wrap.c \
            -o runtimes/osx-arm64/native/libminiaudio.dylib
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - name: C# smoke test
        run: dotnet run --project csharp/Miniaudio.SmokeTest -c Release
      - uses: actions/upload-artifact@v4
        with: { name: runtimes-osx-arm64, path: runtimes/osx-arm64 }

  # ---- WASM + TypeScript --------------------------------------------------------
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: mymindstorm/setup-emsdk@v14
        with: { version: 3.1.74 }
      - name: Build WASM (Emscripten AudioWorklet backend)
        run: bash web/build-wasm.sh
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Typecheck the TS wrapper
        run: cd web && npm install && npm run typecheck
      - uses: actions/upload-artifact@v4
        with: { name: web-dist, path: web/dist }

  # ---- verify the committed C# bindings still match ma_wrap.h -------------------
  bindings-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
      - name: Regenerate and diff
        run: |
          cargo build --manifest-path csharp/codegen/Cargo.toml
          git diff --exit-code csharp/Miniaudio/NativeMethods.g.cs \
            || (echo "::error::NativeMethods.g.cs is stale — re-run codegen and commit." && exit 1)

  # ---- package (manual) ---------------------------------------------------------
  package:
    if: github.event_name == 'workflow_dispatch'
    needs: [linux, windows, macos, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/download-artifact@v4
        with: { pattern: runtimes-*, path: runtimes-dl }
      - name: Assemble runtimes/
        run: |
          mkdir -p runtimes
          cp -r runtimes-dl/runtimes-linux-x64 runtimes/linux-x64
          cp -r runtimes-dl/runtimes-win-x64   runtimes/win-x64
          cp -r runtimes-dl/runtimes-osx-arm64 runtimes/osx-arm64
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 8.0.x }
      - name: NuGet pack (all RIDs)
        run: dotnet pack csharp/Miniaudio/Miniaudio.csproj -c Release -o nupkg
      - uses: actions/download-artifact@v4
        with: { name: web-dist, path: web/dist }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: npm pack
        run: cd web && npm install && npm run build && npm pack
      - uses: actions/upload-artifact@v4
        with: { name: packages, path: "nupkg/*.nupkg" }
